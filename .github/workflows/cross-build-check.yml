name: Cross-build check

# Manual gate for changes that affect native compilation (e.g. new -sys
# crates): proves every precompiled target still builds without cutting a
# release.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ext/kenshin/Cargo.toml'
      - 'Cargo.lock'
      - 'ext/kenshin/extconf.rb'
      - '.github/workflows/cross-build-check.yml'
      - 'scripts/ci/cross_env.sh'

jobs:
  cross-build:
    name: Cross build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'

    - name: Clean vendor directory
      run: rm -rf vendor/bundle

    # pre-script support is unreleased (v1.4.4 accepts but ignores it); pin main
    - uses: oxidize-rb/actions/cross-gem@85175a9d5f63d4491253e957d3fc3f4ed7f17534
      with:
        platform: ${{ matrix.platform }}
        ruby-versions: '3.3,3.4'
        # rb-sys-dock collapses the pre-script to one line, so it must be a
        # single command. Sourced (not executed) so the exports reach cargo.
        pre-script: . scripts/ci/cross_env.sh

    - name: Upload gem artifact
      uses: actions/upload-artifact@v4
      with:
        name: gem-${{ matrix.platform }}
        path: pkg/*-${{ matrix.platform }}.gem
        if-no-files-found: error

  # Installing the precompiled gem on a Rust-free runner proves the artifact
  # is usable, not just that compilation succeeded.
  install-check:
    name: Install precompiled gem (x86_64-linux)
    needs: cross-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'

    - name: Download x86_64-linux gem
      uses: actions/download-artifact@v4
      with:
        name: gem-x86_64-linux
        path: gems

    - name: Install gem without a Rust toolchain
      run: |
        rustup self uninstall -y || true
        gem install gems/*-x86_64-linux.gem

    - name: Format via library API
      run: |
        OUTPUT=$(ruby -rkenshin -e 'puts Kenshin.format("x=1")')
        echo "$OUTPUT"
        test "$OUTPUT" = "x = 1"

    - name: Format via kenshin executable
      run: |
        printf 'def foo\nx=1\nend\n' > /tmp/sample.rb
        kenshin /tmp/sample.rb
        cat /tmp/sample.rb
        grep -q '^  x = 1$' /tmp/sample.rb
        kenshin --check /tmp/sample.rb
