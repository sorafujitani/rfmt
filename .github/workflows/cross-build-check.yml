name: Cross-build check

# Manual gate for changes that affect native compilation (e.g. new -sys
# crates): proves every precompiled target still builds without cutting a
# release.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ext/rfmt/Cargo.toml'
      - 'Cargo.lock'
      - 'ext/rfmt/extconf.rb'

jobs:
  cross-build:
    name: Cross build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'

    - name: Clean vendor directory
      run: rm -rf vendor/bundle

    # pre-script support is unreleased (v1.4.4 accepts but ignores it); pin main
    - uses: oxidize-rb/actions/cross-gem@85175a9d5f63d4491253e957d3fc3f4ed7f17534
      with:
        platform: ${{ matrix.platform }}
        ruby-versions: '3.3,3.4'
        # Diagnostic round: dump the container's cross-toolchain layout to pick
        # the right BINDGEN_EXTRA_CLANG_ARGS sysroot per platform.
        pre-script: |
          echo "=== DIAG target env ==="; env | grep -iE "^cc|cflags|bindgen|sysroot|osxcross|^cargo_|^rust" | sort
          echo "=== DIAG sdk/sysroots ==="; find /opt /usr/local /usr -maxdepth 5 \( -name "*.sdk" -o -name "sysroot" -o -name "*mingw*" -type d \) 2>/dev/null | head -20
          echo "=== DIAG compilers ==="; ls /usr/bin/*-gcc /usr/bin/*-clang /opt/osxcross/target/bin 2>/dev/null | head -20
          echo "=== DIAG print-sysroot ==="; for cc in /usr/bin/*-gcc; do echo "$cc => $($cc -print-sysroot 2>/dev/null)"; done
          echo "=== DIAG libclang ==="; find / -maxdepth 6 -name "libclang*" 2>/dev/null | head -5
          echo "=== DIAG end ==="
